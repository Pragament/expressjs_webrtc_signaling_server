<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>LAN Party Chat · Fixed WebRTC</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 12px;
        }

        .app {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            height: 95vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .title h1 {
            font-size: 1.3rem;
        }

        .connection-status {
            background: rgba(255,255,255,0.2);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
        }

        .connection-status.connected {
            background: #4ade80;
            color: #1e3a2f;
        }

        .main {
            display: flex;
            flex: 1;
            overflow: hidden;
            flex-direction: row;
        }

        @media (max-width: 768px) {
            .main {
                flex-direction: column;
            }
        }

        .sidebar {
            width: 280px;
            background: #f8f9fa;
            border-right: 1px solid #e5e7eb;
            display: flex;
            flex-direction: column;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                max-height: 200px;
            }
        }

        .sidebar-header {
            padding: 15px;
            background: white;
            border-bottom: 1px solid #e5e7eb;
        }

        .peer-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .peer-item {
            background: white;
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 10px;
            border: 1px solid #e5e7eb;
        }

        .peer-item.connected {
            border-left: 4px solid #10b981;
            background: #f0fdf4;
        }

        .peer-item.connecting {
            border-left: 4px solid #f59e0b;
        }

        .peer-name {
            font-weight: 600;
            font-size: 0.9rem;
        }

        .peer-status {
            font-size: 0.7rem;
            margin-top: 4px;
        }

        .peer-status.connected {
            color: #10b981;
        }

        .peer-status.connecting {
            color: #f59e0b;
        }

        .chat-area {
            flex: 2;
            display: flex;
            flex-direction: column;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            background: #f9fafb;
        }

        .message {
            margin-bottom: 12px;
            display: flex;
        }

        .message.self {
            justify-content: flex-end;
        }

        .message-bubble {
            max-width: 80%;
            padding: 8px 12px;
            border-radius: 15px;
            background: white;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .message.self .message-bubble {
            background: #667eea;
            color: white;
        }

        .message-sender {
            font-size: 0.7rem;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .message-text {
            font-size: 0.9rem;
        }

        .system-message {
            text-align: center;
            margin: 8px 0;
        }

        .system-message span {
            background: #e5e7eb;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.65rem;
            color: #6b7280;
        }

        .input-area {
            padding: 12px;
            background: white;
            border-top: 1px solid #e5e7eb;
            display: flex;
            gap: 8px;
        }

        .input-area input {
            flex: 1;
            padding: 10px;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            font-size: 0.9rem;
        }

        .input-area input:focus {
            outline: none;
            border-color: #667eea;
        }

        .input-area button {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
        }

        .settings-panel {
            padding: 10px 15px;
            background: #f3f4f6;
            border-top: 1px solid #e5e7eb;
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
            font-size: 0.8rem;
        }

        .settings-panel input {
            padding: 6px 8px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 0.8rem;
        }

        .settings-panel button {
            padding: 6px 12px;
            background: #6b7280;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .debug-panel {
            font-size: 0.65rem;
            padding: 8px;
            background: #1e1e2e;
            color: #4ade80;
            font-family: monospace;
            border-top: 1px solid #333;
            max-height: 150px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .message-image {
            max-width: 100%;
            border-radius: 8px;
            margin-bottom: 5px;
            cursor: pointer;
            display: block;
        }
        
        .attachment-btn {
            background: #e5e7eb;
            color: #4b5563;
            padding: 0 15px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .attachment-btn:hover:not(:disabled) {
            background: #d1d5db;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="app">
    <div class="header">
        <div class="title">
            <h1>🎉 LAN Party Chat · Fixed</h1>
        </div>
        <div class="connection-status" id="connectionStatus">
            ⚫ Disconnected
        </div>
    </div>
    
    <div class="main">
        <div class="sidebar">
            <div class="sidebar-header">
                <h3>👥 Peers</h3>
                <div id="peerCount" style="margin-top: 5px; font-size: 1.1rem; font-weight: bold; color: #10b981;">0 Online</div>
                <div id="connectedCount" style="font-size: 0.8rem; color: #6b7280; margin-top: 2px;">0/0 connected</div>
            </div>
            <div class="peer-list" id="peerList">
                <div style="text-align: center; padding: 20px; color: #9ca3af;">Connect to see peers</div>
            </div>
        </div>
        
        <div class="chat-area">
            <div class="messages" id="messages">
                <div style="text-align: center; color: #9ca3af; padding: 40px;">✨ Send a message</div>
            </div>
            <div class="input-area">
                <input type="file" id="fileInput" accept="image/*" style="display: none;">
                <button id="attachmentBtn" class="attachment-btn" title="Send Image" disabled>📎</button>
                <input type="text" id="messageInput" placeholder="Type message..." disabled>
                <button id="sendBtn" disabled>Send</button>
            </div>
            <div style="text-align: center; margin-bottom: 5px;">
                <button id="enablePushBtn" style="background: transparent; color: #6b7280; font-size: 0.8rem; border: none; text-decoration: underline; cursor: pointer;">Enable Desktop Notifications</button>
            </div>
            <div class="settings-panel">
                <label>Name:</label>
                <input type="text" id="nameInput" style="width: 100px;">
                <button id="updateNameBtn">Update</button>
                <label>Server:</label>
                <input type="text" id="serverUrl" placeholder="wss://..." style="min-width: 200px;">
                <button id="connectBtn">Connect</button>
                <button id="resetBtn" style="background:#ef4444;">Reset</button>
            </div>
            <div class="debug-panel" id="debugPanel">
                💡 Ready to connect
            </div>
        </div>
    </div>
</div>

<script>
    (function() {
        // DOM Elements
        const elements = {
            peerListDiv: document.getElementById('peerList'),
            messagesDiv: document.getElementById('messages'),
            fileInput: document.getElementById('fileInput'),
            attachmentBtn: document.getElementById('attachmentBtn'),
            messageInput: document.getElementById('messageInput'),
            sendBtn: document.getElementById('sendBtn'),
            nameInput: document.getElementById('nameInput'),
            serverUrlInput: document.getElementById('serverUrl'),
            connectBtn: document.getElementById('connectBtn'),
            resetBtn: document.getElementById('resetBtn'),
            updateNameBtn: document.getElementById('updateNameBtn'),
            connectionStatus: document.getElementById('connectionStatus'),
            peerCountSpan: document.getElementById('peerCount'),
            connectedCountSpan: document.getElementById('connectedCount'),
            debugPanel: document.getElementById('debugPanel')
        };
        
        // Supabase Initialization
        const SUPABASE_URL = 'https://wmlgywjigexyrgpjlztf.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_hk6pKPo2ujDHCYvylvbY0g_P6B1v_PN';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        // Push Notification Constants
        const VAPID_PUBLIC_KEY = 'BDlvn1pa0AAv0Ul-e5xr-PvoWxExA8q3rBx90gktFfEWxFzvDy1-nC-wZqK-pXGLiZMX86WleU3rLIF9kTwn694';
        
        let ws = null;
        let localPeerId = null;
        let localPeerName = localStorage.getItem('peerName') || 'User' + Math.floor(Math.random() * 100);
        
        // Smart Default URL
        const defaultServerUrl = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' 
            ? `ws://${window.location.host}` 
            : 'wss://expressjs-webrtc-signaling-server.onrender.com';
        
        let peers = new Map();
        let connections = new Map();
        let negotiatingPeers = new Set();
        let logs = [];
        
        // Initialize
        elements.nameInput.value = localPeerName;
        
        const savedUrl = localStorage.getItem('serverUrl');
        if (savedUrl) {
            elements.serverUrlInput.value = savedUrl;
        } else {
            elements.serverUrlInput.value = defaultServerUrl;
        }
        
        function log(msg, type = 'info') {
            const timestamp = new Date().toLocaleTimeString();
            logs.unshift(`[${timestamp}] ${msg}`);
            if (logs.length > 20) logs.pop();
            elements.debugPanel.innerHTML = logs.map(l => `> ${l}`).join('<br>');
            console.log(msg);
        }
        
        function setStatus(text, isConnected = false) {
            elements.connectionStatus.textContent = text;
            if (isConnected) {
                elements.connectionStatus.className = 'connection-status connected';
            } else {
                elements.connectionStatus.className = 'connection-status';
            }
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function addSystemMessage(text) {
            if (elements.messagesDiv.children.length === 1 && 
                elements.messagesDiv.children[0].innerText.includes('Send a message')) {
                elements.messagesDiv.innerHTML = '';
            }
            const sysDiv = document.createElement('div');
            sysDiv.className = 'system-message';
            sysDiv.innerHTML = `<span>${escapeHtml(text)}</span>`;
            elements.messagesDiv.appendChild(sysDiv);
            elements.messagesDiv.scrollTop = elements.messagesDiv.scrollHeight;
        }
        
        function addMessage(sender, text, isSelf, imageUrl = null) {
            if (elements.messagesDiv.children.length === 1 && 
                elements.messagesDiv.children[0].innerText.includes('Send a message')) {
                elements.messagesDiv.innerHTML = '';
            }
            
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${isSelf ? 'self' : ''}`;
            
            let contentHtml = '';
            if (imageUrl) {
                contentHtml += `<img src="${imageUrl}" class="message-image" onclick="window.open(this.src)">`;
            }
            if (text) {
                contentHtml += `<div class="message-text">${escapeHtml(text)}</div>`;
            }
            
            msgDiv.innerHTML = `
                <div class="message-bubble">
                    <div class="message-sender">${escapeHtml(sender)}</div>
                    ${contentHtml}
                </div>
            `;
            elements.messagesDiv.appendChild(msgDiv);
            elements.messagesDiv.scrollTop = elements.messagesDiv.scrollHeight;
        }
        
        function renderPeers() {
            const peersArray = Array.from(peers.entries());
            const connectedCount = Array.from(peers.values()).filter(p => p.status === 'connected').length;
            const isServerConnected = ws && ws.readyState === WebSocket.OPEN;
            const totalOnline = isServerConnected ? peersArray.length + 1 : 0;
            
            if (elements.peerCountSpan) {
                elements.peerCountSpan.textContent = `${totalOnline} Online`;
            }
            if (elements.connectedCountSpan) {
                elements.connectedCountSpan.textContent = `${connectedCount}/${peersArray.length} connected`;
            }
            
            if (peersArray.length === 0) {
                elements.peerListDiv.innerHTML = '<div style="text-align: center; padding: 20px; color: #9ca3af;">No other peers online</div>';
                return;
            }
            
            elements.peerListDiv.innerHTML = peersArray.map(([id, peer]) => `
                <div class="peer-item ${peer.status}">
                    <div class="peer-name">${escapeHtml(peer.name)}</div>
                    <div class="peer-status ${peer.status}">
                        ${peer.status === 'connected' ? '● Connected' : '○ Connecting...'}
                    </div>
                </div>
            `).join('');
        }
        
        function cleanupPeer(peerId) {
            negotiatingPeers.delete(peerId);
            const conn = connections.get(peerId);
            if (conn) {
                if (conn.pc) {
                    try { conn.pc.close(); } catch(e) {}
                }
                connections.delete(peerId);
            }
            if (peers.has(peerId)) {
                peers.delete(peerId);
                renderPeers();
            }
        }
        
        // WebRTC Functions with fixed negotiation
        async function initiateConnection(peerId, peerName) {
            // Prevent multiple simultaneous negotiations with the same peer
            if (negotiatingPeers.has(peerId)) {
                log(`Already negotiating with ${peerName}`);
                return;
            }
            
            if (connections.has(peerId)) {
                log(`Already connected to ${peerName}`);
                return;
            }
            
            negotiatingPeers.add(peerId);
            log(`🔌 Initiating connection to ${peerName}...`);
            
            try {
                const pc = new RTCPeerConnection({
                    iceServers: [
                        { urls: 'stun:stun.l.google.com:19302' },
                        { urls: 'stun:stun1.l.google.com:19302' },
                        { urls: 'stun:stun2.l.google.com:19302' }
                    ]
                });
                
                // Only the offerer creates a data channel
                const dc = pc.createDataChannel('chat');
                connections.set(peerId, { pc, dc, name: peerName, role: 'initiator' });
                
                dc.onopen = () => {
                    log(`✅ Data channel OPEN with ${peerName}`);
                    if (peers.has(peerId)) {
                        peers.get(peerId).status = 'connected';
                        renderPeers();
                        addSystemMessage(`✅ Connected to ${peerName}`);
                    }
                };
                
                dc.onclose = () => {
                    log(`❌ Data channel CLOSED with ${peerName}`);
                    if (peers.has(peerId)) {
                        peers.get(peerId).status = 'disconnected';
                        renderPeers();
                    }
                };
                
                dc.onmessage = (e) => {
                    try {
                        const msg = JSON.parse(e.data);
                        if (msg.type === 'chat') {
                            addMessage(msg.sender, msg.text, msg.senderId === localPeerId, msg.image);
                        }
                    } catch (err) {}
                };
                
                pc.onicecandidate = (e) => {
                    if (e.candidate && ws && ws.readyState === WebSocket.OPEN) {
                        ws.send(JSON.stringify({
                            type: 'webrtc_ice_candidate',
                            targetId: peerId,
                            candidate: e.candidate
                        }));
                    }
                };
                
                pc.oniceconnectionstatechange = () => {
                    log(`ICE state with ${peerName}: ${pc.iceConnectionState}`);
                    if (pc.iceConnectionState === 'connected') {
                        log(`🎉 ICE CONNECTED to ${peerName}!`);
                        negotiatingPeers.delete(peerId);
                    } else if (pc.iceConnectionState === 'failed') {
                        log(`❌ ICE FAILED with ${peerName}`, 'error');
                        log(`   Tip: Make sure both devices are on the same network`, 'warn');
                        cleanupPeer(peerId);
                    }
                };
                
                const offer = await pc.createOffer();
                await pc.setLocalDescription(offer);
                
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({
                        type: 'webrtc_offer',
                        targetId: peerId,
                        sdp: pc.localDescription
                    }));
                    log(`📤 Offer sent to ${peerName}`);
                }
                
                // Timeout
                setTimeout(() => {
                    const conn = connections.get(peerId);
                    if (conn && conn.dc && conn.dc.readyState !== 'open') {
                        log(`⏰ Connection timeout for ${peerName}`, 'warn');
                        cleanupPeer(peerId);
                    }
                    negotiatingPeers.delete(peerId);
                }, 20000);
                
            } catch (err) {
                log(`Connection error: ${err.message}`, 'error');
                cleanupPeer(peerId);
            }
        }
        
        async function handleOffer(fromId, fromName, sdp) {
            // If we're already negotiating or connected, ignore
            if (connections.has(fromId)) {
                log(`Already have connection to ${fromName}, ignoring offer`);
                return;
            }
            
            log(`📞 Handling offer from ${fromName}...`);
            
            try {
                const pc = new RTCPeerConnection({
                    iceServers: [
                        { urls: 'stun:stun.l.google.com:19302' },
                        { urls: 'stun:stun1.l.google.com:19302' }
                    ]
                });
                
                let dc = null;
                
                pc.ondatachannel = (e) => {
                    dc = e.channel;
                    log(`📡 Data channel received from ${fromName}`);
                    connections.set(fromId, { pc, dc, name: fromName, role: 'receiver' });
                    
                    dc.onopen = () => {
                        log(`✅ Data channel OPEN with ${fromName}`);
                        if (peers.has(fromId)) {
                            peers.get(fromId).status = 'connected';
                            renderPeers();
                            addSystemMessage(`✅ Connected to ${fromName}`);
                        }
                    };
                    
                    dc.onmessage = (e) => {
                        try {
                            const msg = JSON.parse(e.data);
                            if (msg.type === 'chat') {
                                addMessage(msg.sender, msg.text, false, msg.image);
                            }
                        } catch (err) {}
                    };
                };
                
                pc.onicecandidate = (e) => {
                    if (e.candidate && ws && ws.readyState === WebSocket.OPEN) {
                        ws.send(JSON.stringify({
                            type: 'webrtc_ice_candidate',
                            targetId: fromId,
                            candidate: e.candidate
                        }));
                    }
                };
                
                pc.oniceconnectionstatechange = () => {
                    log(`ICE state with ${fromName}: ${pc.iceConnectionState}`);
                    if (pc.iceConnectionState === 'connected') {
                        log(`🎉 ICE CONNECTED to ${fromName}!`);
                    } else if (pc.iceConnectionState === 'failed') {
                        log(`❌ ICE FAILED with ${fromName}`, 'error');
                        cleanupPeer(fromId);
                    }
                };
                
                await pc.setRemoteDescription(new RTCSessionDescription(sdp));
                const answer = await pc.createAnswer();
                await pc.setLocalDescription(answer);
                
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({
                        type: 'webrtc_answer',
                        targetId: fromId,
                        sdp: pc.localDescription
                    }));
                    log(`📤 Answer sent to ${fromName}`);
                }
                
            } catch (err) {
                log(`Offer handling error: ${err.message}`, 'error');
                cleanupPeer(fromId);
            }
        }
        
        async function handleAnswer(fromId, sdp) {
            const conn = connections.get(fromId);
            if (conn && conn.pc && conn.role === 'initiator' && !conn.pc.remoteDescription) {
                try {
                    await conn.pc.setRemoteDescription(new RTCSessionDescription(sdp));
                    log(`✅ Remote description set for ${conn.name}`);
                    
                    // Add queued candidates
                    if (conn.queuedCandidates) {
                        for (const candidate of conn.queuedCandidates) {
                            try { await conn.pc.addIceCandidate(new RTCIceCandidate(candidate)); } catch(e) {}
                        }
                        conn.queuedCandidates = [];
                    }
                } catch (err) {
                    log(`Answer error: ${err.message}`, 'error');
                }
            }
        }
        
        async function handleIceCandidate(fromId, candidate) {
            const conn = connections.get(fromId);
            if (conn && conn.pc) {
                if (conn.pc.remoteDescription) {
                    try {
                        await conn.pc.addIceCandidate(new RTCIceCandidate(candidate));
                    } catch (err) {
                        // Ignore candidate errors
                    }
                } else {
                    // Queue candidate until remote description is set
                    conn.queuedCandidates = conn.queuedCandidates || [];
                    conn.queuedCandidates.push(candidate);
                }
            }
        }
        
        // WebSocket functions
        function connect() {
            let url = elements.serverUrlInput.value.trim();
            if (!url) {
                alert('Please enter server URL');
                return;
            }
            
            localStorage.setItem('serverUrl', url);
            log(`Connecting to ${url}`);
            setStatus('Connecting...');
            
            if (ws) {
                try { ws.close(); } catch(e) {}
            }
            
            try {
                ws = new WebSocket(url);
                ws.onopen = onOpen;
                ws.onmessage = onMessage;
                ws.onerror = (e) => log(`WS Error: ${e}`, 'error');
                ws.onclose = onClose;
            } catch (err) {
                log(`Connection failed: ${err.message}`, 'error');
                setStatus('Failed');
            }
        }
        
        function reset() {
            log('🔄 Resetting all connections...');
            // Close all peer connections
            for (const [id, conn] of connections) {
                try { conn.pc.close(); } catch(e) {}
            }
            connections.clear();
            peers.clear();
            negotiatingPeers.clear();
            renderPeers();
            
            // Re-register with server
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    type: 'register',
                    peerId: localPeerId,
                    peerName: localPeerName
                }));
            }
        }
        
        function onOpen() {
            log('WebSocket connected');
            setStatus('Connected', true);
            
            localPeerId = 'peer_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
            log(`Registering as ${localPeerName} (${localPeerId})`);
            
            ws.send(JSON.stringify({
                type: 'register',
                peerId: localPeerId,
                peerName: localPeerName
            }));
            
            elements.messageInput.disabled = false;
            elements.sendBtn.disabled = false;
            elements.attachmentBtn.disabled = false;
            renderPeers();
        }
        
        function onMessage(event) {
            try {
                const data = JSON.parse(event.data);
                
                switch(data.type) {
                    case 'peer_list':
                        log(`Peer list: ${data.peers.length} peers`);
                        // Only connect to peers with higher ID to avoid double connections
                        data.peers.forEach(peer => {
                            if (!peers.has(peer.peerId)) {
                                addPeer(peer.peerId, peer.peerName);
                                // Only the peer with the "higher" ID initiates to avoid race
                                if (localPeerId > peer.peerId) {
                                    setTimeout(() => initiateConnection(peer.peerId, peer.peerName), 1000);
                                } else {
                                    log(`Waiting for ${peer.peerName} to initiate connection`);
                                }
                            }
                        });
                        break;
                        
                    case 'peer_joined':
                        if (data.peerId !== localPeerId && !peers.has(data.peerId)) {
                            log(`New peer joined: ${data.peerName}`);
                            addPeer(data.peerId, data.peerName);
                            addSystemMessage(`${data.peerName} joined`);
                            // Only initiate if our ID is higher
                            if (localPeerId > data.peerId) {
                                setTimeout(() => initiateConnection(data.peerId, data.peerName), 1000);
                            } else {
                                log(`Waiting for ${data.peerName} to initiate connection`);
                            }
                        }
                        break;
                        
                    case 'peer_left':
                        if (peers.has(data.peerId)) {
                            const peer = peers.get(data.peerId);
                            log(`Peer left: ${peer.name}`);
                            addSystemMessage(`${peer.name} left`);
                            cleanupPeer(data.peerId);
                        }
                        break;
                        
                    case 'webrtc_offer':
                        handleOffer(data.fromId, data.fromName, data.sdp);
                        break;
                        
                    case 'webrtc_answer':
                        handleAnswer(data.fromId, data.sdp);
                        break;
                        
                    case 'webrtc_ice_candidate':
                        handleIceCandidate(data.fromId, data.candidate);
                        break;
                        
                    case 'server_chat':
                        const conn = connections.get(data.senderId);
                        if (conn && conn.dc && conn.dc.readyState === 'open') {
                            // Already received or will receive via WebRTC
                        } else {
                            addMessage(data.senderName, data.text, false, data.image);
                        }
                        break;
                }
            } catch (err) {
                log(`Message error: ${err.message}`, 'error');
            }
        }
        
        function addPeer(peerId, name) {
            peers.set(peerId, { name, status: 'connecting' });
            renderPeers();
        }
        
        function onClose() {
            log('WebSocket disconnected', 'warn');
            setStatus('Disconnected');
            elements.messageInput.disabled = true;
            elements.sendBtn.disabled = true;
            elements.attachmentBtn.disabled = true;
            
            // Clean up all connections
            for (const [id, conn] of connections) {
                try { conn.pc.close(); } catch(e) {}
            }
            connections.clear();
            peers.clear();
            renderPeers();
            negotiatingPeers.clear();
            
            // Auto reconnect
            setTimeout(() => {
                if (!ws || ws.readyState === WebSocket.CLOSED) {
                    log('Auto-reconnecting...');
                    connect();
                }
            }, 5000);
        }
        
        function sendChatMessage(text, imageUrl = null) {
            if (!text && !imageUrl) return;
            
            const message = {
                type: 'chat',
                sender: localPeerName,
                senderId: localPeerId,
                text: text,
                image: imageUrl
            };
            
            let sent = 0;
            for (const [id, conn] of connections) {
                if (conn.dc && conn.dc.readyState === 'open') {
                    try {
                        conn.dc.send(JSON.stringify(message));
                        sent++;
                    } catch(e) {
                        log(`Failed to send to ${conn.name}`, 'warn');
                    }
                }
            }
            
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    type: 'broadcast_chat',
                    text: text,
                    image: imageUrl
                }));
                sent++;
            }
            
            if (sent > 0) {
                addMessage(localPeerName, text, true, imageUrl);
                log(`📤 Message sent`);
                
                // Trigger Push Notification via Supabase Edge Function
                triggerPushNotification(text, imageUrl);
                
            } else {
                log(`❌ No connected peers or server`, 'warn');
                addSystemMessage('No connected peers or server');
            }
        }
        
        async function triggerPushNotification(text, imageUrl) {
            try {
                await supabase.functions.invoke('send-push', {
                    body: {
                        senderName: localPeerName,
                        message: text,
                        image: imageUrl
                    }
                });
            } catch (error) {
                console.error('Error triggering push:', error);
            }
        }
        
        function sendMessage() {
            const text = elements.messageInput.value.trim();
            if (text) {
                sendChatMessage(text);
                elements.messageInput.value = '';
            }
        }
        
        function processAndSendImage(file) {
            if (!file || !file.type.startsWith('image/')) return;
            
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 800;
                    const MAX_HEIGHT = 800;
                    let width = img.width;
                    let height = img.height;
                    
                    if (width > height) {
                        if (width > MAX_WIDTH) {
                            height *= MAX_WIDTH / width;
                            width = MAX_WIDTH;
                        }
                    } else {
                        if (height > MAX_HEIGHT) {
                            width *= MAX_HEIGHT / height;
                            height = MAX_HEIGHT;
                        }
                    }
                    
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    const dataUrl = canvas.toDataURL('image/jpeg', 0.6);
                    sendChatMessage('', dataUrl);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }
        
        function updateName() {
            const newName = elements.nameInput.value.trim();
            if (newName && newName !== localPeerName) {
                localPeerName = newName;
                localStorage.setItem('peerName', localPeerName);
                addSystemMessage(`Name changed to ${localPeerName}`);
                log(`Name changed to ${localPeerName}`);
                
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({
                        type: 'register',
                        peerId: localPeerId,
                        peerName: localPeerName
                    }));
                }
            }
        }
        
        // Event listeners
        elements.connectBtn.onclick = connect;
        elements.sendBtn.onclick = sendMessage;
        elements.updateNameBtn.onclick = updateName;
        elements.resetBtn.onclick = reset;
        elements.messageInput.onkeypress = (e) => {
            if (e.key === 'Enter') sendMessage();
        };
        elements.attachmentBtn.onclick = () => elements.fileInput.click();
        elements.fileInput.onchange = (e) => {
            if (e.target.files && e.target.files[0]) {
                processAndSendImage(e.target.files[0]);
                e.target.value = ''; // Reset input
            }
        };
        
        // Push Notifications Setup
        document.getElementById('enablePushBtn').onclick = async () => {
            if (!('serviceWorker' in navigator) || !('PushManager' in window)) {
                alert('Push notifications are not supported in this browser.');
                return;
            }
            
            try {
                const permission = await Notification.requestPermission();
                if (permission !== 'granted') {
                    alert('Permission not granted for notifications.');
                    return;
                }
                
                const registration = await navigator.serviceWorker.register('./sw.js');
                log('Service Worker registered');
                
                // Helper to convert base64 url to Uint8Array
                const urlBase64ToUint8Array = (base64String) => {
                    const padding = '='.repeat((4 - base64String.length % 4) % 4);
                    const base64 = (base64String + padding).replace(/\-/g, '+').replace(/_/g, '/');
                    const rawData = window.atob(base64);
                    const outputArray = new Uint8Array(rawData.length);
                    for (let i = 0; i < rawData.length; ++i) {
                        outputArray[i] = rawData.charCodeAt(i);
                    }
                    return outputArray;
                };
                
                let subscription = await registration.pushManager.getSubscription();
                if (!subscription) {
                    subscription = await registration.pushManager.subscribe({
                        userVisibleOnly: true,
                        applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
                    });
                }
                
                log('Push subscribed! Saving to Supabase...');
                
                // Save to Supabase
                const { error } = await supabase.from('push_subscriptions').insert([
                    { peer_name: localPeerName, subscription: subscription }
                ]);
                
                if (error) {
                    log(`DB Error: ${error.message}`, 'error');
                } else {
                    alert('Notifications enabled successfully!');
                    document.getElementById('enablePushBtn').style.display = 'none';
                }
                
            } catch (e) {
                log(`Push setup error: ${e.message}`, 'error');
            }
        };
        
        log('App ready - Fixed WebRTC connection handling');
        log('Enter your Render.com WebSocket URL and click Connect');
    })();
</script>
