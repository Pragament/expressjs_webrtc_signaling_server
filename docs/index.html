<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>LAN Party Chat · WebRTC Debug</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 12px;
        }

        .app {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            height: 95vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .title h1 {
            font-size: 1.3rem;
        }

        .connection-status {
            background: rgba(255,255,255,0.2);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
        }

        .connection-status.connected {
            background: #4ade80;
            color: #1e3a2f;
        }

        .main {
            display: flex;
            flex: 1;
            overflow: hidden;
            flex-direction: row;
        }

        @media (max-width: 768px) {
            .main {
                flex-direction: column;
            }
        }

        .sidebar {
            width: 280px;
            background: #f8f9fa;
            border-right: 1px solid #e5e7eb;
            display: flex;
            flex-direction: column;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                max-height: 200px;
            }
        }

        .sidebar-header {
            padding: 15px;
            background: white;
            border-bottom: 1px solid #e5e7eb;
        }

        .peer-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .peer-item {
            background: white;
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 10px;
            border: 1px solid #e5e7eb;
        }

        .peer-item.connected {
            border-left: 4px solid #10b981;
            background: #f0fdf4;
        }

        .peer-item.connecting {
            border-left: 4px solid #f59e0b;
        }

        .peer-name {
            font-weight: 600;
            font-size: 0.9rem;
        }

        .peer-status {
            font-size: 0.7rem;
            margin-top: 4px;
        }

        .peer-status.connected {
            color: #10b981;
        }

        .peer-status.connecting {
            color: #f59e0b;
        }

        .chat-area {
            flex: 2;
            display: flex;
            flex-direction: column;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            background: #f9fafb;
        }

        .message {
            margin-bottom: 12px;
            display: flex;
        }

        .message.self {
            justify-content: flex-end;
        }

        .message-bubble {
            max-width: 80%;
            padding: 8px 12px;
            border-radius: 15px;
            background: white;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .message.self .message-bubble {
            background: #667eea;
            color: white;
        }

        .message-sender {
            font-size: 0.7rem;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .message-text {
            font-size: 0.9rem;
        }

        .system-message {
            text-align: center;
            margin: 8px 0;
        }

        .system-message span {
            background: #e5e7eb;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.65rem;
            color: #6b7280;
        }

        .input-area {
            padding: 12px;
            background: white;
            border-top: 1px solid #e5e7eb;
            display: flex;
            gap: 8px;
        }

        .input-area input {
            flex: 1;
            padding: 10px;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            font-size: 0.9rem;
        }

        .input-area button {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
        }

        .settings-panel {
            padding: 10px 15px;
            background: #f3f4f6;
            border-top: 1px solid #e5e7eb;
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
            font-size: 0.8rem;
        }

        .settings-panel input {
            padding: 6px 8px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 0.8rem;
        }

        .settings-panel button {
            padding: 6px 12px;
            background: #6b7280;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .debug-panel {
            font-size: 0.65rem;
            padding: 8px;
            background: #1e1e2e;
            color: #4ade80;
            font-family: monospace;
            border-top: 1px solid #333;
            max-height: 150px;
            overflow-y: auto;
            white-space: pre-wrap;
        }

        button:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <div class="title">
            <h1>🎉 LAN Party Chat</h1>
        </div>
        <div class="connection-status" id="connectionStatus">
            ⚫ Disconnected
        </div>
    </div>
    
    <div class="main">
        <div class="sidebar">
            <div class="sidebar-header">
                <h3>👥 Peers</h3>
                <div id="peerCount">0 online</div>
            </div>
            <div class="peer-list" id="peerList">
                <div style="text-align: center; padding: 20px;">Connect to see peers</div>
            </div>
        </div>
        
        <div class="chat-area">
            <div class="messages" id="messages">
                <div style="text-align: center; padding: 40px;">✨ Send a message</div>
            </div>
            <div class="input-area">
                <input type="text" id="messageInput" placeholder="Type message..." disabled>
                <button id="sendBtn" disabled>Send</button>
            </div>
            <div class="settings-panel">
                <label>Name:</label>
                <input type="text" id="nameInput" style="width: 100px;">
                <button id="updateNameBtn">Update</button>
                <label>Server:</label>
                <input type="text" id="serverUrl" placeholder="wss://your-server.onrender.com" style="min-width: 200px;">
                <button id="connectBtn">Connect</button>
                <button id="retryBtn" style="background:#f59e0b;">Retry Connection</button>
            </div>
            <div class="debug-panel" id="debugPanel">
                💡 Ready to connect
            </div>
        </div>
    </div>
</div>

<script>
    class WebRTCDebugClient {
        constructor() {
            this.ws = null;
            this.localPeerId = null;
            this.localPeerName = localStorage.getItem('peerName') || this.getRandomName();
            this.peers = new Map();
            this.connections = new Map();
            this.logs = [];
            
            // DOM
            this.peerListDiv = document.getElementById('peerList');
            this.messagesDiv = document.getElementById('messages');
            this.messageInput = document.getElementById('messageInput');
            this.sendBtn = document.getElementById('sendBtn');
            this.nameInput = document.getElementById('nameInput');
            this.serverUrlInput = document.getElementById('serverUrl');
            this.connectBtn = document.getElementById('connectBtn');
            this.retryBtn = document.getElementById('retryBtn');
            this.connectionStatus = document.getElementById('connectionStatus');
            this.peerCountSpan = document.getElementById('peerCount');
            this.debugPanel = document.getElementById('debugPanel');
            
            this.nameInput.value = this.localPeerName;
            
            const savedUrl = localStorage.getItem('serverUrl');
            if (savedUrl) {
                this.serverUrlInput.value = savedUrl;
            }
            
            this.bindEvents();
        }
        
        log(msg, type = 'info') {
            const timestamp = new Date().toLocaleTimeString();
            const colors = { info: '#4ade80', error: '#ef4444', warn: '#f59e0b' };
            this.logs.unshift(`[${timestamp}] ${msg}`);
            if (this.logs.length > 20) this.logs.pop();
            this.debugPanel.innerHTML = this.logs.map(l => `> ${l}`).join('<br>');
            console.log(msg);
        }
        
        getRandomName() {
            const names = ['User', 'Device', 'Client', 'Node'];
            return `${names[Math.floor(Math.random() * names.length)]}${Math.floor(Math.random() * 100)}`;
        }
        
        bindEvents() {
            this.sendBtn.onclick = () => this.sendMessage();
            this.messageInput.onkeypress = (e) => { if (e.key === 'Enter') this.sendMessage(); };
            this.updateNameBtn.onclick = () => this.updateName();
            this.connectBtn.onclick = () => this.connect();
            this.retryBtn.onclick = () => this.retryConnections();
        }
        
        connect() {
            let url = this.serverUrlInput.value.trim();
            if (!url) {
                alert('Enter server URL');
                return;
            }
            
            localStorage.setItem('serverUrl', url);
            this.log(`Connecting to ${url}`);
            this.setStatus('Connecting...');
            
            if (this.ws) this.ws.close();
            
            try {
                this.ws = new WebSocket(url);
                this.ws.onopen = () => this.onOpen();
                this.ws.onmessage = (e) => this.onMessage(e);
                this.ws.onerror = (e) => this.log(`WS Error: ${e}`, 'error');
                this.ws.onclose = () => this.onClose();
            } catch (err) {
                this.log(`Connection failed: ${err.message}`, 'error');
            }
        }
        
        onOpen() {
            this.log('WebSocket connected');
            this.setStatus('Connected');
            
            this.localPeerId = 'peer_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
            this.log(`Registering as ${this.localPeerName} (${this.localPeerId})`);
            
            this.ws.send(JSON.stringify({
                type: 'register',
                peerId: this.localPeerId,
                peerName: this.localPeerName
            }));
            
            this.messageInput.disabled = false;
            this.sendBtn.disabled = false;
        }
        
        onMessage(event) {
            const data = JSON.parse(event.data);
            this.log(`Received: ${data.type}`);
            
            switch(data.type) {
                case 'peer_list':
                    this.log(`Peer list: ${data.peers.length} peers`);
                    data.peers.forEach(peer => {
                        if (!this.peers.has(peer.peerId)) {
                            this.addPeer(peer.peerId, peer.peerName);
                            setTimeout(() => this.initiateConnection(peer.peerId, peer.peerName), 1000);
                        }
                    });
                    this.renderPeers();
                    break;
                    
                case 'peer_joined':
                    if (data.peerId !== this.localPeerId && !this.peers.has(data.peerId)) {
                        this.log(`New peer joined: ${data.peerName}`);
                        this.addPeer(data.peerId, data.peerName);
                        this.addSystemMessage(`${data.peerName} joined`);
                        setTimeout(() => this.initiateConnection(data.peerId, data.peerName), 1000);
                    }
                    break;
                    
                case 'peer_left':
                    if (this.peers.has(data.peerId)) {
                        const peer = this.peers.get(data.peerId);
                        this.log(`Peer left: ${peer.name}`);
                        this.addSystemMessage(`${peer.name} left`);
                        this.removePeer(data.peerId);
                    }
                    break;
                    
                case 'webrtc_offer':
                    this.log(`📨 Offer from ${data.fromName}`);
                    this.handleOffer(data.fromId, data.fromName, data.sdp);
                    break;
                    
                case 'webrtc_answer':
                    this.log(`📨 Answer from ${data.fromId}`);
                    this.handleAnswer(data.fromId, data.sdp);
                    break;
                    
                case 'webrtc_ice_candidate':
                    this.handleIceCandidate(data.fromId, data.candidate);
                    break;
            }
        }
        
        onClose() {
            this.log('WebSocket disconnected', 'warn');
            this.setStatus('Disconnected');
            this.messageInput.disabled = true;
            this.sendBtn.disabled = true;
            
            for (const [id, conn] of this.connections) {
                if (conn.pc) conn.pc.close();
            }
            this.connections.clear();
            this.peers.clear();
            this.renderPeers();
            
            setTimeout(() => {
                if (!this.ws || this.ws.readyState === WebSocket.CLOSED) {
                    this.log('Auto-reconnecting...');
                    this.connect();
                }
            }, 5000);
        }
        
        addPeer(peerId, name) {
            this.peers.set(peerId, { name, status: 'connecting' });
            this.renderPeers();
        }
        
        removePeer(peerId) {
            const conn = this.connections.get(peerId);
            if (conn && conn.pc) conn.pc.close();
            this.connections.delete(peerId);
            this.peers.delete(peerId);
            this.renderPeers();
        }
        
        async initiateConnection(peerId, peerName) {
            if (this.connections.has(peerId)) {
                this.log(`Already connecting to ${peerName}`);
                return;
            }
            
            this.log(`🔌 Initiating connection to ${peerName}...`);
            
            try {
                const pc = new RTCPeerConnection({
                    iceServers: [
                        { urls: 'stun:stun.l.google.com:19302' },
                        { urls: 'stun:stun1.l.google.com:19302' },
                        { urls: 'stun:stun2.l.google.com:19302' }
                    ]
                });
                
                const dc = pc.createDataChannel('chat');
                this.connections.set(peerId, { pc, dc, name: peerName });
                
                dc.onopen = () => {
                    this.log(`✅ Data channel OPEN with ${peerName}`);
                    if (this.peers.has(peerId)) {
                        this.peers.get(peerId).status = 'connected';
                        this.renderPeers();
                        this.addSystemMessage(`✅ Connected to ${peerName}`);
                    }
                };
                
                dc.onclose = () => {
                    this.log(`❌ Data channel CLOSED with ${peerName}`, 'warn');
                    if (this.peers.has(peerId)) {
                        this.peers.get(peerId).status = 'disconnected';
                        this.renderPeers();
                    }
                };
                
                dc.onerror = (err) => {
                    this.log(`Data channel error: ${err}`, 'error');
                };
                
                dc.onmessage = (e) => {
                    const msg = JSON.parse(e.data);
                    if (msg.type === 'chat') {
                        this.addMessage(msg.sender, msg.text, msg.senderId === this.localPeerId);
                    }
                };
                
                pc.onicecandidate = (e) => {
                    if (e.candidate) {
                        this.log(`📡 ICE candidate sent to ${peerName}`);
                        this.ws.send(JSON.stringify({
                            type: 'webrtc_ice_candidate',
                            targetId: peerId,
                            candidate: e.candidate
                        }));
                    } else {
                        this.log(`✅ ICE gathering complete for ${peerName}`);
                    }
                };
                
                pc.oniceconnectionstatechange = () => {
                    this.log(`ICE state with ${peerName}: ${pc.iceConnectionState}`);
                    if (pc.iceConnectionState === 'connected') {
                        this.log(`🎉 ICE CONNECTED to ${peerName}!`);
                    } else if (pc.iceConnectionState === 'failed') {
                        this.log(`❌ ICE FAILED with ${peerName}`, 'error');
                        this.log(`   This usually means devices cannot reach each other directly`, 'warn');
                        this.log(`   Try: Both devices on same WiFi, or use TURN server`, 'warn');
                    }
                };
                
                const offer = await pc.createOffer();
                await pc.setLocalDescription(offer);
                this.log(`📤 Sending offer to ${peerName}`);
                
                this.ws.send(JSON.stringify({
                    type: 'webrtc_offer',
                    targetId: peerId,
                    sdp: pc.localDescription
                }));
                
                // Timeout
                setTimeout(() => {
                    const conn = this.connections.get(peerId);
                    if (conn && conn.dc.readyState !== 'open') {
                        this.log(`⏰ Connection timeout for ${peerName}`, 'warn');
                        this.removePeer(peerId);
                    }
                }, 30000);
                
            } catch (err) {
                this.log(`Connection error: ${err.message}`, 'error');
                this.removePeer(peerId);
            }
        }
        
        async handleOffer(fromId, fromName, sdp) {
            if (this.connections.has(fromId)) {
                this.log(`Already have connection to ${fromName}, ignoring offer`);
                return;
            }
            
            this.log(`📞 Handling offer from ${fromName}...`);
            
            try {
                const pc = new RTCPeerConnection({
                    iceServers: [
                        { urls: 'stun:stun.l.google.com:19302' },
                        { urls: 'stun:stun1.l.google.com:19302' }
                    ]
                });
                
                let dc = null;
                
                pc.ondatachannel = (e) => {
                    dc = e.channel;
                    this.log(`📡 Data channel received from ${fromName}`);
                    this.connections.set(fromId, { pc, dc, name: fromName });
                    
                    dc.onopen = () => {
                        this.log(`✅ Data channel OPEN with ${fromName}`);
                        if (this.peers.has(fromId)) {
                            this.peers.get(fromId).status = 'connected';
                            this.renderPeers();
                            this.addSystemMessage(`✅ Connected to ${fromName}`);
                        }
                    };
                    
                    dc.onmessage = (e) => {
                        const msg = JSON.parse(e.data);
                        if (msg.type === 'chat') {
                            this.addMessage(msg.sender, msg.text, false);
                        }
                    };
                };
                
                pc.onicecandidate = (e) => {
                    if (e.candidate) {
                        this.ws.send(JSON.stringify({
                            type: 'webrtc_ice_candidate',
                            targetId: fromId,
                            candidate: e.candidate
                        }));
                    }
                };
                
                pc.oniceconnectionstatechange = () => {
                    this.log(`ICE state with ${fromName}: ${pc.iceConnectionState}`);
                };
                
                await pc.setRemoteDescription(new RTCSessionDescription(sdp));
                const answer = await pc.createAnswer();
                await pc.setLocalDescription(answer);
                
                this.ws.send(JSON.stringify({
                    type: 'webrtc_answer',
                    targetId: fromId,
                    sdp: pc.localDescription
                }));
                
                this.log(`📤 Sent answer to ${fromName}`);
                
            } catch (err) {
                this.log(`Offer handling error: ${err.message}`, 'error');
            }
        }
        
        async handleAnswer(fromId, sdp) {
            const conn = this.connections.get(fromId);
            if (conn && conn.pc && !conn.pc.remoteDescription) {
                await conn.pc.setRemoteDescription(new RTCSessionDescription(sdp));
                this.log(`✅ Remote description set for ${conn.name}`);
            }
        }
        
        async handleIceCandidate(fromId, candidate) {
            const conn = this.connections.get(fromId);
            if (conn && conn.pc && conn.pc.remoteDescription) {
                await conn.pc.addIceCandidate(new RTCIceCandidate(candidate));
                this.log(`❄️ ICE candidate added for ${conn.name}`);
            }
        }
        
        retryConnections() {
            this.log('🔄 Retrying all connections...');
            for (const [peerId, peer] of this.peers) {
                if (peer.status !== 'connected') {
                    this.initiateConnection(peerId, peer.name);
                }
            }
        }
        
        sendMessage() {
            const text = this.messageInput.value.trim();
            if (!text) return;
            
            const message = {
                type: 'chat',
                sender: this.localPeerName,
                senderId: this.localPeerId,
                text: text
            };
            
            let sent = 0;
            for (const [id, conn] of this.connections) {
                if (conn.dc && conn.dc.readyState === 'open') {
                    conn.dc.send(JSON.stringify(message));
                    sent++;
                }
            }
            
            if (sent > 0) {
                this.addMessage(this.localPeerName, text, true);
                this.messageInput.value = '';
                this.log(`📤 Message sent to ${sent} peer(s)`);
            } else {
                this.log(`❌ No connected peers to send to`, 'warn');
                this.addSystemMessage('No connected peers');
            }
        }
        
        addMessage(sender, text, isSelf) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${isSelf ? 'self' : ''}`;
            msgDiv.innerHTML = `
                <div class="message-bubble">
                    <div class="message-sender">${this.escapeHtml(sender)}</div>
                    <div class="message-text">${this.escapeHtml(text)}</div>
                </div>
            `;
            
            if (this.messagesDiv.children.length === 1 && this.messagesDiv.children[0].innerText.includes('Send a message')) {
                this.messagesDiv.innerHTML = '';
            }
            
            this.messagesDiv.appendChild(msgDiv);
            this.messagesDiv.scrollTop = this.messagesDiv.scrollHeight;
        }
        
        addSystemMessage(text) {
            const sysDiv = document.createElement('div');
            sysDiv.className = 'system-message';
            sysDiv.innerHTML = `<span>${this.escapeHtml(text)}</span>`;
            this.messagesDiv.appendChild(sysDiv);
            this.messagesDiv.scrollTop = this.messagesDiv.scrollHeight;
        }
        
        renderPeers() {
            const peersArray = Array.from(this.peers.entries());
            const connectedCount = Array.from(this.peers.values()).filter(p => p.status === 'connected').length;
            this.peerCountSpan.textContent = `${connectedCount}/${peersArray.length} connected`;
            
            if (peersArray.length === 0) {
                this.peerListDiv.innerHTML = '<div style="text-align: center; padding: 20px;">No peers</div>';
                return;
            }
            
            this.peerListDiv.innerHTML = peersArray.map(([id, peer]) => `
                <div class="peer-item ${peer.status}">
                    <div class="peer-name">${this.escapeHtml(peer.name)}</div>
                    <div class="peer-status ${peer.status}">
                        ${peer.status === 'connected' ? '● Connected' : '○ Connecting...'}
                    </div>
                </div>
            `).join('');
        }
        
        updateName() {
            const newName = this.nameInput.value.trim();
            if (newName && newName !== this.localPeerName) {
                this.localPeerName = newName;
                localStorage.setItem('peerName', this.localPeerName);
                this.addSystemMessage(`Name changed to ${this.localPeerName}`);
                
                if (this.ws && this.ws.readyState === WebSocket.OPEN) {
                    this.ws.send(JSON.stringify({
                        type: 'register',
                        peerId: this.localPeerId,
                        peerName: this.localPeerName
                    }));
                }
            }
        }
        
        setStatus(text) {
            this.connectionStatus.textContent = text;
            this.connectionStatus.className = `connection-status ${text === 'Connected' ? 'connected' : ''}`;
        }
        
        escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    }
    
    new WebRTCDebugClient();
</script>
</body>
</html>
