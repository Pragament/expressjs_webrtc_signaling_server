<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAN Party Chat · Simple & Reliable</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .app {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            height: 90vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .title h1 {
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        .title p {
            font-size: 0.85rem;
            opacity: 0.9;
        }

        .connection-status {
            background: rgba(255,255,255,0.2);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .connection-status.connected {
            background: #4ade80;
            color: #1e3a2f;
        }

        .main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .sidebar {
            width: 280px;
            background: #f8f9fa;
            border-right: 1px solid #e5e7eb;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px;
            background: white;
            border-bottom: 1px solid #e5e7eb;
        }

        .peer-list {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .peer-item {
            background: white;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 10px;
            border: 1px solid #e5e7eb;
            transition: all 0.2s;
        }

        .peer-item.connected {
            border-left: 4px solid #10b981;
            background: #f0fdf4;
        }

        .peer-item.connecting {
            border-left: 4px solid #f59e0b;
        }

        .peer-name {
            font-weight: 600;
            margin-bottom: 5px;
        }

        .peer-status {
            font-size: 0.7rem;
        }

        .peer-status.connected {
            color: #10b981;
        }

        .peer-status.connecting {
            color: #f59e0b;
        }

        .chat-area {
            flex: 2;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            padding: 20px;
            background: white;
            border-bottom: 1px solid #e5e7eb;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f9fafb;
        }

        .message {
            margin-bottom: 15px;
            display: flex;
        }

        .message.self {
            justify-content: flex-end;
        }

        .message-bubble {
            max-width: 70%;
            padding: 10px 15px;
            border-radius: 15px;
            background: white;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .message.self .message-bubble {
            background: #667eea;
            color: white;
        }

        .message-sender {
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 5px;
            color: #6b7280;
        }

        .message.self .message-sender {
            color: #c7d2fe;
        }

        .message-text {
            word-wrap: break-word;
        }

        .message-time {
            font-size: 0.65rem;
            margin-top: 5px;
            opacity: 0.7;
        }

        .system-message {
            text-align: center;
            margin: 10px 0;
        }

        .system-message span {
            background: #e5e7eb;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            color: #6b7280;
        }

        .input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #e5e7eb;
            display: flex;
            gap: 10px;
        }

        .input-area input {
            flex: 1;
            padding: 12px;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            font-size: 0.9rem;
            outline: none;
        }

        .input-area input:focus {
            border-color: #667eea;
        }

        .input-area button {
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
        }

        .input-area button:hover:not(:disabled) {
            background: #5a67d8;
        }

        .settings-panel {
            padding: 15px 20px;
            background: #f3f4f6;
            border-top: 1px solid #e5e7eb;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .settings-panel input {
            flex: 1;
            padding: 8px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 0.85rem;
        }

        .settings-panel button {
            padding: 8px 16px;
            background: #6b7280;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 240px;
            }
        }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <div class="title">
            <h1>🎉 LAN Party Chat</h1>
            <p>Simple WebRTC Broadcast</p>
        </div>
        <div class="connection-status" id="connectionStatus">
            ⚫ Disconnected
        </div>
    </div>
    
    <div class="main">
        <div class="sidebar">
            <div class="sidebar-header">
                <h3>👥 Connected Peers</h3>
                <div id="peerCount" style="font-size: 0.85rem; color: #6b7280;">0 online</div>
            </div>
            <div class="peer-list" id="peerList">
                <div style="text-align: center; padding: 20px; color: #9ca3af;">Connect to see peers</div>
            </div>
        </div>
        
        <div class="chat-area">
            <div class="chat-header">
                <h2>💬 Group Broadcast</h2>
                <p style="font-size: 0.85rem; color: #6b7280;">Messages are sent to all connected peers</p>
            </div>
            <div class="messages" id="messages">
                <div style="text-align: center; color: #9ca3af; padding: 40px;">✨ Send a message</div>
            </div>
            <div class="input-area">
                <input type="text" id="messageInput" placeholder="Type your message..." disabled>
                <button id="sendBtn" disabled>📨 Send</button>
            </div>
            <div class="settings-panel">
                <label>Your name:</label>
                <input type="text" id="nameInput" style="width: 120px;">
                <button id="updateNameBtn">Update</button>
                <label>Server:</label>
                <input type="text" id="serverUrl" placeholder="wss://your-server.onrender.com" style="flex: 2;">
                <button id="connectBtn">Connect</button>
            </div>
        </div>
    </div>
</div>

<script>
    class SimpleWebRTCClient {
        constructor() {
            this.ws = null;
            this.localPeerId = null;
            this.localPeerName = localStorage.getItem('peerName') || this.getRandomName();
            this.peers = new Map();
            this.connections = new Map(); // peerId -> { pc, dc }
            
            // DOM elements
            this.peerListDiv = document.getElementById('peerList');
            this.messagesDiv = document.getElementById('messages');
            this.messageInput = document.getElementById('messageInput');
            this.sendBtn = document.getElementById('sendBtn');
            this.nameInput = document.getElementById('nameInput');
            this.updateNameBtn = document.getElementById('updateNameBtn');
            this.serverUrlInput = document.getElementById('serverUrl');
            this.connectBtn = document.getElementById('connectBtn');
            this.connectionStatus = document.getElementById('connectionStatus');
            this.peerCountSpan = document.getElementById('peerCount');
            
            // Initialize
            this.nameInput.value = this.localPeerName;
            this.serverUrlInput.value = localStorage.getItem('serverUrl') || '';
            
            this.bindEvents();
            
            if (this.serverUrlInput.value) {
                setTimeout(() => this.connect(), 500);
            }
        }
        
        getRandomName() {
            const names = ['Alice', 'Bob', 'Charlie', 'David', 'Emma', 'Frank', 'Grace', 'Henry'];
            return names[Math.floor(Math.random() * names.length)];
        }
        
        bindEvents() {
            this.sendBtn.onclick = () => this.sendMessage();
            this.messageInput.onkeypress = (e) => { if (e.key === 'Enter') this.sendMessage(); };
            this.updateNameBtn.onclick = () => this.updateName();
            this.connectBtn.onclick = () => this.connect();
        }
        
        connect() {
            const url = this.serverUrlInput.value.trim();
            if (!url) {
                alert('Please enter server URL');
                return;
            }
            
            localStorage.setItem('serverUrl', url);
            this.setStatus('Connecting...', 'connecting');
            
            if (this.ws) this.ws.close();
            
            this.ws = new WebSocket(url);
            this.ws.onopen = () => this.onOpen();
            this.ws.onmessage = (e) => this.onMessage(e);
            this.ws.onerror = () => this.setStatus('Error', 'error');
            this.ws.onclose = () => this.onClose();
        }
        
        onOpen() {
            this.setStatus('Connected', 'connected');
            this.localPeerId = 'peer_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
            
            this.ws.send(JSON.stringify({
                type: 'register',
                peerId: this.localPeerId,
                peerName: this.localPeerName
            }));
            
            this.messageInput.disabled = false;
            this.sendBtn.disabled = false;
        }
        
        onMessage(event) {
            const data = JSON.parse(event.data);
            
            switch(data.type) {
                case 'peer_list':
                    data.peers.forEach(peer => {
                        if (!this.peers.has(peer.peerId)) {
                            this.addPeer(peer.peerId, peer.peerName);
                            setTimeout(() => this.connectToPeer(peer.peerId, peer.peerName), 1000);
                        }
                    });
                    this.renderPeers();
                    break;
                    
                case 'peer_joined':
                    if (data.peerId !== this.localPeerId && !this.peers.has(data.peerId)) {
                        this.addPeer(data.peerId, data.peerName);
                        this.addSystemMessage(`${data.peerName} joined`);
                        setTimeout(() => this.connectToPeer(data.peerId, data.peerName), 1000);
                    }
                    break;
                    
                case 'peer_left':
                    if (this.peers.has(data.peerId)) {
                        const peer = this.peers.get(data.peerId);
                        this.addSystemMessage(`${peer.name} left`);
                        this.removePeer(data.peerId);
                    }
                    break;
                    
                case 'webrtc_offer':
                    this.handleOffer(data.fromId, data.fromName, data.sdp);
                    break;
                    
                case 'webrtc_answer':
                    this.handleAnswer(data.fromId, data.sdp);
                    break;
                    
                case 'webrtc_ice_candidate':
                    this.handleIceCandidate(data.fromId, data.candidate);
                    break;
            }
        }
        
        onClose() {
            this.setStatus('Disconnected', 'error');
            this.messageInput.disabled = true;
            this.sendBtn.disabled = true;
            
            // Clean up all connections
            for (const [id, conn] of this.connections) {
                if (conn.pc) conn.pc.close();
            }
            this.connections.clear();
            this.peers.clear();
            this.renderPeers();
            
            setTimeout(() => this.connect(), 3000);
        }
        
        addPeer(peerId, name) {
            this.peers.set(peerId, { name, status: 'connecting' });
            this.renderPeers();
        }
        
        removePeer(peerId) {
            const conn = this.connections.get(peerId);
            if (conn && conn.pc) conn.pc.close();
            this.connections.delete(peerId);
            this.peers.delete(peerId);
            this.renderPeers();
        }
        
        async connectToPeer(peerId, peerName) {
            if (this.connections.has(peerId)) return;
            
            try {
                const pc = new RTCPeerConnection({
                    iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
                });
                
                const dc = pc.createDataChannel('chat');
                
                this.connections.set(peerId, { pc, dc });
                
                dc.onopen = () => {
                    console.log(`Connected to ${peerName}`);
                    if (this.peers.has(peerId)) {
                        this.peers.get(peerId).status = 'connected';
                        this.renderPeers();
                        this.addSystemMessage(`Connected to ${peerName}`);
                    }
                };
                
                dc.onclose = () => {
                    console.log(`Disconnected from ${peerName}`);
                    if (this.peers.has(peerId)) {
                        this.peers.get(peerId).status = 'disconnected';
                        this.renderPeers();
                    }
                };
                
                dc.onmessage = (e) => {
                    const msg = JSON.parse(e.data);
                    if (msg.type === 'chat') {
                        this.addMessage(msg.sender, msg.text, msg.senderId === this.localPeerId);
                    }
                };
                
                pc.onicecandidate = (e) => {
                    if (e.candidate) {
                        this.ws.send(JSON.stringify({
                            type: 'webrtc_ice_candidate',
                            targetId: peerId,
                            candidate: e.candidate
                        }));
                    }
                };
                
                const offer = await pc.createOffer();
                await pc.setLocalDescription(offer);
                
                this.ws.send(JSON.stringify({
                    type: 'webrtc_offer',
                    targetId: peerId,
                    sdp: pc.localDescription
                }));
                
            } catch (err) {
                console.error('Connection error:', err);
            }
        }
        
        async handleOffer(fromId, fromName, sdp) {
            if (this.connections.has(fromId)) return;
            
            try {
                const pc = new RTCPeerConnection({
                    iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
                });
                
                let dc = null;
                
                pc.ondatachannel = (e) => {
                    dc = e.channel;
                    this.connections.set(fromId, { pc, dc });
                    
                    dc.onopen = () => {
                        if (this.peers.has(fromId)) {
                            this.peers.get(fromId).status = 'connected';
                            this.renderPeers();
                            this.addSystemMessage(`Connected to ${fromName}`);
                        }
                    };
                    
                    dc.onmessage = (e) => {
                        const msg = JSON.parse(e.data);
                        if (msg.type === 'chat') {
                            this.addMessage(msg.sender, msg.text, false);
                        }
                    };
                };
                
                pc.onicecandidate = (e) => {
                    if (e.candidate) {
                        this.ws.send(JSON.stringify({
                            type: 'webrtc_ice_candidate',
                            targetId: fromId,
                            candidate: e.candidate
                        }));
                    }
                };
                
                await pc.setRemoteDescription(new RTCSessionDescription(sdp));
                const answer = await pc.createAnswer();
                await pc.setLocalDescription(answer);
                
                this.ws.send(JSON.stringify({
                    type: 'webrtc_answer',
                    targetId: fromId,
                    sdp: pc.localDescription
                }));
                
            } catch (err) {
                console.error('Offer handling error:', err);
            }
        }
        
        async handleAnswer(fromId, sdp) {
            const conn = this.connections.get(fromId);
            if (conn && conn.pc && !conn.pc.remoteDescription) {
                await conn.pc.setRemoteDescription(new RTCSessionDescription(sdp));
            }
        }
        
        async handleIceCandidate(fromId, candidate) {
            const conn = this.connections.get(fromId);
            if (conn && conn.pc && conn.pc.remoteDescription) {
                await conn.pc.addIceCandidate(new RTCIceCandidate(candidate));
            }
        }
        
        sendMessage() {
            const text = this.messageInput.value.trim();
            if (!text) return;
            
            const message = {
                type: 'chat',
                sender: this.localPeerName,
                senderId: this.localPeerId,
                text: text,
                time: Date.now()
            };
            
            let sent = 0;
            for (const [id, conn] of this.connections) {
                if (conn.dc && conn.dc.readyState === 'open') {
                    conn.dc.send(JSON.stringify(message));
                    sent++;
                }
            }
            
            if (sent > 0) {
                this.addMessage(this.localPeerName, text, true);
                this.messageInput.value = '';
            } else {
                this.addSystemMessage('No connected peers');
            }
        }
        
        addMessage(sender, text, isSelf) {
            const messagesDiv = this.messagesDiv;
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${isSelf ? 'self' : ''}`;
            msgDiv.innerHTML = `
                <div class="message-bubble">
                    <div class="message-sender">${this.escapeHtml(sender)}</div>
                    <div class="message-text">${this.escapeHtml(text)}</div>
                    <div class="message-time">${new Date().toLocaleTimeString()}</div>
                </div>
            `;
            
            // Remove placeholder if exists
            if (messagesDiv.children.length === 1 && messagesDiv.children[0].innerText.includes('Send a message')) {
                messagesDiv.innerHTML = '';
            }
            
            messagesDiv.appendChild(msgDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        addSystemMessage(text) {
            const messagesDiv = this.messagesDiv;
            const sysDiv = document.createElement('div');
            sysDiv.className = 'system-message';
            sysDiv.innerHTML = `<span>${this.escapeHtml(text)}</span>`;
            messagesDiv.appendChild(sysDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        renderPeers() {
            const peersArray = Array.from(this.peers.entries());
            const connectedCount = Array.from(this.peers.values()).filter(p => p.status === 'connected').length;
            this.peerCountSpan.textContent = `${connectedCount}/${peersArray.length} connected`;
            
            if (peersArray.length === 0) {
                this.peerListDiv.innerHTML = '<div style="text-align: center; padding: 20px; color: #9ca3af;">No peers online</div>';
                return;
            }
            
            this.peerListDiv.innerHTML = peersArray.map(([id, peer]) => `
                <div class="peer-item ${peer.status}">
                    <div class="peer-name">${this.escapeHtml(peer.name)}</div>
                    <div class="peer-status ${peer.status}">
                        ${peer.status === 'connected' ? '● Connected' : '○ Connecting...'}
                    </div>
                </div>
            `).join('');
        }
        
        updateName() {
            const newName = this.nameInput.value.trim();
            if (newName && newName !== this.localPeerName) {
                this.localPeerName = newName;
                localStorage.setItem('peerName', this.localPeerName);
                this.addSystemMessage(`You are now known as ${this.localPeerName}`);
                
                // Re-register
                if (this.ws && this.ws.readyState === WebSocket.OPEN) {
                    this.ws.send(JSON.stringify({
                        type: 'register',
                        peerId: this.localPeerId,
                        peerName: this.localPeerName
                    }));
                }
            }
        }
        
        setStatus(text, type) {
            this.connectionStatus.textContent = text;
            this.connectionStatus.className = `connection-status ${type}`;
        }
        
        escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    }
    
    new SimpleWebRTCClient();
</script>
</body>
</html>
